<div class="sign-fullscreen">

  <div class="header">
    <h3>Firma cliente</h3>
  </div>

  <div class="canvas-container">
    <canvas #signPadCanvas></canvas>
  </div>

  <div class="footer">
    <button mat-raised-button color="primary" (click)="saveSignPad()">
      Salva
    </button>

    <button mat-stroked-button (click)="clearSignPad()">
      Rifirma
    </button>

    <button mat-button mat-dialog-close>
      Annulla
    </button>
  </div>

</div>
