<h2 mat-dialog-title>
  {{ isEdit ? 'Modifica Visita' : 'Nuova Visita' }}
</h2>

<mat-dialog-content>

  <div class="form-grid">
    <mat-form-field appearance="outline" class="full-width"
                    *ngIf="perm.canFilterSede">
      <mat-label>Sede</mat-label>
      <mat-select [(ngModel)]="dto.sedeId" required>
        <mat-option *ngFor="let s of sedi" [value]="s.id">
          {{ s.descrizione }}
        </mat-option>
      </mat-select>
    </mat-form-field>


      <mat-form-field appearance="outline">
        <mat-label>Data</mat-label>
        <input matInput
               [matDatepicker]="picker"
               [(ngModel)]="dto.dataVisita">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Ora</mat-label>
        <input matInput
               type="time"
               [(ngModel)]="oraVisita">
      </mat-form-field>


    <mat-form-field appearance="outline">
      <mat-label>Nome cliente</mat-label>
      <input matInput [(ngModel)]="dto.nomeCliente">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Telefono</mat-label>
      <input matInput
             [(ngModel)]="dto.telefono"
             type="tel"
             inputmode="numeric"
             maxlength="15"
             (input)="onTelefonoInput($event)">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Motivo principale</mat-label>
      <mat-select [(ngModel)]="motivoRootId"
                  (selectionChange)="onMotivoRootChange($event.value)">
        <mat-option *ngFor="let m of motiviRoot"
                    [value]="m.id">
          {{ m.descrizione }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Sotto-motivo (opzionale)</mat-label>
      <mat-select [(ngModel)]="motivoFiglioId"
                  [disabled]="!motiviFigli.length">
        <mat-option [value]="null">
          Nessuno
        </mat-option>

        <mat-option *ngFor="let m of motiviFigli"
                    [value]="m.id">
          {{ m.descrizione }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Venditore</mat-label>
      <mat-select [(ngModel)]="dto.venditoreCodice">
        <mat-option *ngFor="let v of venditori"
                    [value]="v.codVenditore">
          {{ v.fullname }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Comune</mat-label>
      <input matInput
             [(ngModel)]="comuneSearch"
             (ngModelChange)="onComuneSearch($event)">
    </mat-form-field>

    <div class="autocomplete-dropdown" *ngIf="listaComuni && listaComuni.length > 0">
      <div class="autocomplete-item"
           *ngFor="let c of listaComuni"
           (click)="selectComune(c)">
        {{ c.nomeComune }} ({{ c.siglaProvincia }})
      </div>
    </div>
    <mat-form-field appearance="outline">
      <mat-label>Note</mat-label>
      <textarea matInput
                rows="3"
                [(ngModel)]="dto.note">
      </textarea>
    </mat-form-field>
  </div>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button mat-button (click)="close()">
    Annulla
  </button>

  <button mat-raised-button
          color="primary"
          (click)="save()"
          [disabled]="loader">
    Salva
  </button>

</mat-dialog-actions>
